[intent]
outcome = "lazybrew no longer hammers Homebrew on a fixed 60 s loop; different data classes refresh at appropriate rates and panels only fetch when viewed."

[problem]
description = "The current model refreshes everything every 60 seconds, including expensive tap-info, config, and doctor calls. M25-M27 fix per-panel call volume, but without a refresh strategy the app still refreshes everything on the same schedule."

