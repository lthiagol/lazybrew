[scope]
in_scope = [
    "Combine formula/cask outdated fetch into single brew outdated --json=v2 call",
    "Request coalescing for in-flight Outdated() calls",
    "Lazy-load Outdated panel on first focus instead of Init()",
    "Configurable cache TTL (cache_ttl_seconds, default 30)",
]
out_of_scope = [
    "General controller refactor (deferred to backlog B-01)",
    "Lazy loading for other panels (covered by M28)",
    "Background prefetch / auto-refresh policy redesign (covered by M28)",
    "brew doctor exit-code bug (covered by M26)",
    "Taps tap-info batch loading (covered by M27)",
]

