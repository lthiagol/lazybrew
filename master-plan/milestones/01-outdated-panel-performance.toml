[intent]
outcome = "The Outdated panel should appear quickly when the user opens it."

[problem]
description = "Today it is one of the slowest parts of startup because it triggers redundant brew outdated subprocesses. This milestone removes those redundancies: combine the formula/cask outdated fetch into a single Homebrew call, deduplicate concurrent requests, and only fetch Outdated data when the panel is first viewed."

