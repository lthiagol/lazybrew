[workflow]
profile = "full"

[workflow.artifacts]
brief = true
backlog = true
milestones = true
tracks = true
ideas = true
decisions = true

[workflow.plan]
in_repo = true
location = "master-plan"

[workflow.gates]
strictness = "full"

[workflow.session]

[output]
default_format = "json"

[display]

[archive]
auto_purge_days = 0
archive_on_milestone_delete = true
archive_on_track_cancel = true

[next]
prefer = "milestone"

[git]
auto_commit = false
commit_on_milestone_complete = false

[planning]
require_min_out_of_scope = 2
require_min_acceptance_criteria = 1
